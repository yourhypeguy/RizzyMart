<div class="best-selling-container">
    <div>
        <h2>Best Selling Products</h2>
    </div>

    <div class="carousel">

    

    <!-- Product display -->
    <div class="product">
     <div class="product-img-con">
       <img class="product-img"
        [src]="products[currentIndex()].image" 
        alt="Product image"
      />
      <span><img class="hot-deal-badge" src="./assets/hot-deal.png" alt="Hot Deal"></span>
     </div>
     
    <div class="product-price-cart">
        <div class="price-section">
          <p class="price">
          {{ products[currentIndex()].price | currency: 'NGN': 'symbol' }}
        </p>
        </div>

        <div class="ATR-section">
          <button class="ATR-btn">Add to Cart <span style="font-weight: bolder;">+</span></button>
        </div>
    </div>
     

      
    <div class="product-arrow-con">
      <!-- Left arrow -->
    <button class="arrow left, left-arrow" (click)="prevProduct()">‹</button>

      <p class="name">
        {{ products[currentIndex()].name }}
      </p>

       <!-- Right arrow -->
    <button class="arrow right, right-arrow" (click)="nextProduct()">›</button>
    </div>
    </div>

    
    

   

  </div>

  
</div>
